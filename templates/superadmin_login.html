<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Super Admin</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<div class="card">

<h2>Institute Admin Login</h2>

<form method="POST">

<input
type="text"
name="username"
placeholder="Admin Username"
required>

<input
type="password"
name="password"
placeholder="Admin Password"
required>

<button class="btn teacher">
Login
</button>

</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

</div>

</div>

</body>
</html>
