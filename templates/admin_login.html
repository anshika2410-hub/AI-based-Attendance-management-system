<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Teacher Login</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="login-body">

    <div class="login-box">
 
<h2>Teacher Login</h2>

<form method="POST">

    <input type="text"
           name="institute_id"
           placeholder="Institute ID"
           required>

    <input type="text"
           name="username"
           placeholder="Username"
           required>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <button type="submit" class="btn teacher">
        Login
    </button>

</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

</div>

</div>

</body>
</html>
